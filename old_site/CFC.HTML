<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Ministry - Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        header h1 {
            font-size: 4em;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        header p {
            font-size: 1.5em;
            margin-top: 10px;
            font-style: italic;
            font-weight: bold;
            color: #ffeaa7;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            background-color: #34495e;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 10px 15px;
            transition: background 0.3s;
        }
        nav ul li a:hover {
            background-color: #1abc9c;
            border-radius: 5px;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        #home {
            background: url('./1000045164.jpg') no-repeat center center/cover;
            color: white;
            padding: 100px 40px;
            min-height: 400px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.5s ease;
        }
        .gallery img:hover {
            transform: translateX(20px); /* Moves image 20px to the right on hover */
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>TeamKJ Official</h1>
        <p>One Voice, One Faith, One Family</p>
    </header>
    <nav>
        <ul>
            <li><a href="#home">HOME</a></li>
            <li><a href="#about">ABOUT US</a></li>
            <li><a href="#gallery">GALLERY</a></li>
        </ul>
    </nav>

    <section id="home">
    </section>

    <section id="about">
        <h2>About Us</h2>
        <p>We are a passionate group of musicians dedicated to leading the congregation in worship, creating an atmosphere where hearts connect with God.</p>
    </section>

    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery">
            <img src="1.jpg" alt="Music Ministry Photo 1">
            <img src="2.jpg" alt="Music Ministry Photo 2">
            <img src="3.jpg" alt="Music Ministry Photo 3">
            <img src="4.jpg" alt="Music Ministry Photo 4">
            <img src="5.jpg" alt="Music Ministry Photo 5">
            <img src="6.jpg" alt="Music Ministry Photo 6">
            <img src="7.jpg" alt="Music Ministry Photo 7">
            <img src="8.jpg" alt="Music Ministry Photo 8">
            <img src="9.jpg" alt="Music Ministry Photo 9">
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Music Ministry. All rights reserved.</p>
    </footer>
</body>
</html>
