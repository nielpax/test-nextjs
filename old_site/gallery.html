<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Ministry - Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background: url('back.jpg') no-repeat center center/cover;
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        header h1 {
            font-size: 4em;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        header p {
            font-size: 1.5em;
            margin-top: 10px;
            font-style: italic;
            font-weight: bold;
            color: #ffeaa7;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            background-color: #34495e;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 10px 15px;
            transition: background 0.3s;
        }
        nav ul li a:hover {
            background-color: #1abc9c;
            border-radius: 5px;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        #gallery {
            padding: 40px;
            text-align: center;
            overflow: hidden;
        }
        .gallery {
            display: flex;
            overflow: hidden;
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 400px;
            border: 5px solid #2c3e50;
            border-radius: 10px;
            background-color: #000;
        }
        .gallery-container {
            display: flex;
            transition: transform 1.5s ease;
        }
        .gallery img {
            width: 800px;
            height: 400px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 5px;
        }
        .gallery img:hover {
            cursor: pointer;
            filter: brightness(1.2);
        }
        .gallery-nav {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .gallery-nav .dot {
            width: 12px;
            height: 12px;
            background-color: #bbb;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .gallery-nav .dot.active {
            background-color: #e74c3c;
        }
        .gallery-nav .dot:hover {
            background-color: #1abc9c;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>TeamKJ Official</h1>
        <p>One Voice, One Faith, One Family</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT US</a></li>
            <li><a href="gallery.html">GALLERY</a></li>
        </ul>
    </nav>

    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery">
            <div class="gallery-container">
                <img src="1.jpg" alt="Music Ministry Photo 1">
                <img src="2.jpg" alt="Music Ministry Photo 2">
                <img src="3.jpg" alt="Music Ministry Photo 3">
                <img src="4.jpg" alt="Music Ministry Photo 4">
                <img src="5.jpg" alt="Music Ministry Photo 5">
                <img src="6.jpg" alt="Music Ministry Photo 6">
                <img src="7.jpg" alt="Music Ministry Photo 7">
                <img src="8.jpg" alt="Music Ministry Photo 8">
                <img src="9.jpg" alt="Music Ministry Photo 9">
            </div>
        </div>
        <div class="gallery-nav">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Music Ministry. All rights reserved.</p>
    </footer>

    <script>
        const galleryContainer = document.querySelector('.gallery-container');
        const images = document.querySelectorAll('.gallery img');
        const dots = document.querySelectorAll('.gallery-nav .dot');
        let currentIndex = 0;

        // Function to update the active dot
        function updateDots() {
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        // Hover event for images
        images.forEach((img, index) => {
            img.addEventListener('mouseenter', () => {
                currentIndex = (index + 1) % images.length; // Move to next image, loop back to start
                galleryContainer.style.transform = `translateX(-${currentIndex * 800}px)`; // Shift gallery right to left
                updateDots();
            });
        });

        // Click event for dots
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                currentIndex = index; // Set to clicked image
                galleryContainer.style.transform = `translateX(-${currentIndex * 800}px)`; // Shift gallery right to left
                updateDots();
            });
        });
    </script>
</body>
</html>
